name: baseliner

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install baseliner
        run: curl -fsSL https://raw.githubusercontent.com/baselinerhq/baseliner/main/scripts/install.sh | bash
        env:
          # Pin the scanner version: reproducible scans, and avoids the
          # unauthenticated "latest release" API lookup that gets rate-limited
          # on shared CI runner IPs.
          VERSION: v0.2.1

      - name: Run baseliner
        run: |
          "$HOME/.local/bin/baseliner" scan \
            --config baseliner.yaml \
            --output-file results.json \
            --open-issues \
            --format both
        env:
          GITHUB_TOKEN: ${{ secrets.BASELINER_TOKEN }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: baseliner-results
          path: results.json
          if-no-files-found: warn
