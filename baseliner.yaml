# baseliner control config for the baselinerhq organization.
# Scanned weekly by .github/workflows/baseliner.yml.
scope:
  github:
    type: org
    name: baselinerhq
  # This control repo is the scanner's home, not a scanned project.
  exclude:
    - baseliner-control
policy:
  base: default
  # Infra repos aren't software projects: the org profile repo (.github) and the
  # auto-generated Homebrew tap legitimately have no CI, CODEOWNERS, dependency
  # manifests, or .gitignore. Waive only those; everything else still applies.
  repo_ignores:
    "baselinerhq/.github":
      - ci_present
      - codeowners_exists
      - dependency_update_config
      - gitignore_exists
    "baselinerhq/homebrew-tap":
      - ci_present
      - codeowners_exists
      - dependency_update_config
      - gitignore_exists

# Privacy guard: this control repo is public and its token can read private
# repos. Redact private/internal repos from the public scan output (console
# logs + results.json artifact). A no-op while the org is all-public; it takes
# effect the moment a private repo is added. See:
# https://baselinerhq.github.io/configuration#privacy-guard
privacy:
  public_context: true
  private_repos: redact
